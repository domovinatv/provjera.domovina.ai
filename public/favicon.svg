<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    DOMOVINA brand obitelj — ADHD.provjera
    Stilizirani mozak (prednji pogled, dvije hemisfere) kao centralni simbol;
    predstavlja domenu samoprocjene neurokognitivnih simptoma.
    Vanjski "D" s horizontalnim trikolornim gradijentom hrvatske zastave,
    bijeli unutarnji "D" kao negativan prostor, sve u skladu s ostalim
    Domovina proizvodima (TV, AI, Energy, Klubovi, Cloud, Karta).
  -->
  <defs>
    <linearGradient id="croFlagVertical" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="33.3%" stop-color="#FF0000"/>
      <stop offset="33.3%" stop-color="#FFFFFF"/>
      <stop offset="66.6%" stop-color="#FFFFFF"/>
      <stop offset="66.6%" stop-color="#002F6C"/>
      <stop offset="100%" stop-color="#002F6C"/>
    </linearGradient>
  </defs>

  <!-- Pozadina sa zaobljenim kutovima -->
  <rect width="512" height="512" rx="32" fill="white"/>

  <!-- Vanjski "D" s trikolornim ispunom -->
  <path d="M72 64H248C354.071 64 440 149.929 440 256C440 362.071 354.071 448 248 448H72V64Z"
        fill="url(#croFlagVertical)"/>

  <!-- Unutarnji bijeli "D" — negativan prostor oko centralnog simbola -->
  <path d="M168 160H248C301.019 160 344 202.981 344 256C344 309.019 301.019 352 248 352H168V160Z"
        fill="white"/>

  <!-- Centralni simbol: stilizirani mozak (prednji pogled) -->
  <g stroke="#002F6C" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Lijeva hemisfera (outline) -->
    <path d="
      M 245 200
      C 230 196, 215 200, 207 210
      C 198 215, 192 224, 192 234
      C 184 240, 182 252, 188 262
      C 184 272, 188 284, 198 290
      C 200 302, 212 310, 226 308
      C 232 314, 244 316, 245 312
      Z" />
    <!-- Desna hemisfera (outline) — zrcalno -->
    <path d="
      M 247 200
      C 262 196, 277 200, 285 210
      C 294 215, 300 224, 300 234
      C 308 240, 310 252, 304 262
      C 308 272, 304 284, 294 290
      C 292 302, 280 310, 266 308
      C 260 314, 248 316, 247 312
      Z" />

    <!-- Corpus callosum — okomita razdvojna linija između hemisfera -->
    <line x1="246" y1="206" x2="246" y2="312" />

    <!-- Vijuge — lijeva hemisfera (tanke krivulje) -->
    <path d="M 215 220 C 220 226, 225 222, 230 228" stroke-width="5"/>
    <path d="M 205 245 C 213 250, 222 244, 232 250" stroke-width="5"/>
    <path d="M 210 272 C 218 276, 226 270, 234 276" stroke-width="5"/>

    <!-- Vijuge — desna hemisfera -->
    <path d="M 262 228 C 267 222, 272 226, 277 220" stroke-width="5"/>
    <path d="M 260 250 C 270 244, 279 250, 287 245" stroke-width="5"/>
    <path d="M 258 276 C 266 270, 274 276, 282 272" stroke-width="5"/>
  </g>
</svg>
